<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美股 ETF 定投策略模拟器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans p-4 md:p-8">
    <div class="max-w-4xl mx-auto space-y-6">
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-bold text-blue-600">ETF 定投模拟器 (真实历史回放版)</h1>
            <p class="text-sm text-gray-500">保留连跌惯性，完美复现真实熊市周期与亏损</p>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold">1. ETF 资金配置 (每月)</h2>
                <button onclick="addEtfRow()" class="text-sm bg-blue-100 text-blue-600 px-3 py-1 rounded hover:bg-blue-200">+ 添加 ETF</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left" id="etfTable">
                    <thead>
                        <tr class="text-gray-500 text-sm border-b">
                            <th class="pb-2">ETF 代码</th>
                            <th class="pb-2">月投入 (元)</th>
                            <th class="pb-2">是否现金池</th>
                            <th class="pb-2 text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody id="etfBody">
                    </tbody>
                </table>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-xl font-semibold">2. 投资期限选择</h2>
                <span class="text-lg font-bold text-blue-600" id="yearLabel">10 年</span>
            </div>
            <input type="range" id="yearSlider" min="1" max="30" value="10" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer" oninput="updateYearLabel(); runSimulation();">
        </div>

        <button onclick="fetchDataAndSimulate()" id="runBtn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition shadow-md">
            联网获取数据并开始模拟
        </button>
        <p id="loadingMsg" class="text-sm text-center text-blue-500 hidden animate-pulse">正在提取历史走势切片，请稍候...</p>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 text-center">
                <p class="text-xs text-gray-500 mb-1">累计投入本金</p>
                <p class="text-xl font-bold" id="resPrincipal">¥ 0</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 text-center">
                <p class="text-xs text-gray-500 mb-1">期末税后总资产</p>
                <p class="text-xl font-bold text-blue-600" id="resAssets">¥ 0</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 text-center">
                <p class="text-xs text-gray-500 mb-1">税前总收益 / 预扣税(20%)</p>
                <p class="text-sm font-bold text-green-600" id="resProfitInfo">¥ 0 / ¥ 0</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 text-center">
                <p class="text-xs text-gray-500 mb-1">资产/本金 最终比值</p>
                <p class="text-xl font-bold text-red-500" id="resCagr">0.00 x</p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <h2 class="text-xl font-semibold mb-4">3. 本金与资产走势对比 (多拖动几次年份，体验不同开局)</h2>
            <div class="relative h-64 md:h-96 w-full">
                <canvas id="growthChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // 内置一份写死的 2022 年大熊市连续暴跌序列作为兜底，防止 API 失效导致看不到回撤
        const bearMarketSequence = [-0.05, -0.03, -0.08, 0.02, -0.06, -0.04, 0.03, -0.09, -0.02, 0.04, -0.07, 0.01];
        const bullMarketSequence = [0.03, 0.04, 0.01, -0.02, 0.05, 0.02, 0.06, 0.01, -0.01, 0.04, 0.03, 0.02];
        const mixSequence = bearMarketSequence.concat(bullMarketSequence, bullMarketSequence);

        const fallbackStats = {
            'QQQM': { returns: mixSequence }, 'VOO': { returns: mixSequence },
            'SGOV': { returns: [0.003, 0.004, 0.003, 0.004] }
        };

        let etfStats = {}; 
        let chartInstance = null;

        window.onload = () => {
            addEtfRow('QQQM', 2000, false);
            addEtfRow('VOO', 1000, false);
            addEtfRow('SGOV', 2400, true);
        };

        function addEtfRow(ticker = '', amount = 1000, isCashPool = false) {
            const tbody = document.getElementById('etfBody');
            const tr = document.createElement('tr');
            tr.className = "border-b border-gray-50";
            tr.innerHTML = `
                <td class="py-2 pr-2"><input type="text" value="${ticker}" placeholder="如 QQQM" class="w-full border rounded p-1 uppercase etf-ticker text-sm"></td>
                <td class="py-2 pr-2"><input type="number" value="${amount}" min="0" step="100" class="w-full border rounded p-1 etf-amount text-sm"></td>
                <td class="py-2 text-center"><input type="checkbox" class="etf-cashpool w-4 h-4 cursor-pointer" ${isCashPool ? 'checked' : ''}></td>
                <td class="py-2 text-center"><button onclick="this.closest('tr').remove()" class="text-red-500 text-sm hover:underline">删除</button></td>
            `;
            tbody.appendChild(tr);
        }

        function updateYearLabel() {
            document.getElementById('yearLabel').innerText = document.getElementById('yearSlider').value + ' 年';
        }

        async function fetchETFDataAndCalculate(ticker) {
            ticker = ticker.toUpperCase().trim();
            if (!ticker) return;
            try {
                const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?range=10y&interval=1mo`;
                const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
                const response = await fetch(proxyUrl);
                const data = await response.json();
                
                const closePrices = data.chart.result[0].indicators.quote[0].close.filter(p => p !== null);
                if (closePrices.length < 2) throw new Error("数据不足");

                let logReturns = [];
                for (let i = 1; i < closePrices.length; i++) {
                    logReturns.push(Math.log(closePrices[i] / closePrices[i - 1]));
                }
                etfStats[ticker] = { returns: logReturns };
            } catch (err) {
                console.warn(`${ticker} 获取失败，使用内置大跌测试序列`, err);
                etfStats[ticker] = fallbackStats[ticker] || { returns: bearMarketSequence.concat(bullMarketSequence) };
            }
        }

        async function fetchDataAndSimulate() {
            const btn = document.getElementById('runBtn');
            const msg = document.getElementById('loadingMsg');
            btn.disabled = true;
            btn.classList.add('opacity-50');
            msg.classList.remove('hidden');

            const rows = document.querySelectorAll('#etfBody tr');
            const fetchPromises = [];
            rows.forEach(row => {
                const ticker = row.querySelector('.etf-ticker').value;
                if (!etfStats[ticker]) fetchPromises.push(fetchETFDataAndCalculate(ticker));
            });

            await Promise.all(fetchPromises);
            btn.disabled = false;
            btn.classList.remove('opacity-50');
            msg.classList.add('hidden');
            runSimulation();
        }

        function runSimulation() {
            if (Object.keys(etfStats).length === 0) return;

            const years = parseInt(document.getElementById('yearSlider').value);
            const months = years * 12;
            const rows = document.querySelectorAll('#etfBody tr');
            let portfolio = [];
            
            rows.forEach(row => {
                const ticker = row.querySelector('.etf-ticker').value.toUpperCase().trim();
                const amount = parseFloat(row.querySelector('.etf-amount').value) || 0;
                const isCash = row.querySelector('.etf-cashpool').checked;
                if (ticker && amount > 0) {
                    portfolio.push({ 
                        ticker, amount, isCash, 
                        shares: 0, currentPrice: 100, 
                        highWaterMark: 100, dip10Bought: false, dip20Bought: false 
                    });
                }
            });

            // 核心修复 1：随机选取历史上的一个月作为“统一开局起点”
            // 这样所有 ETF 都会沿着同一段真实历史往前走，完全保留连涨和连跌的原始状态
            let maxHistory = 0;
            for(let key in etfStats) {
                if(etfStats[key].returns) maxHistory = Math.max(maxHistory, etfStats[key].returns.length);
            }
            let globalStartIndex = maxHistory > 0 ? Math.floor(Math.random() * maxHistory) : 0;

            let cashPoolBalance = 0;
            let totalPrincipal = 0;
            let historyPrincipal = [];
            let historyValue = [];
            let labels = [];

            // 核心修复 2：以真实的 2026 年当月（3月）为起点的坐标轴
            let startDate = new Date(2026, 2); // 0代表1月，2代表3月

            for (let m = 1; m <= months; m++) {
                // 计算坐标轴时间
                startDate.setMonth(startDate.getMonth() + 1);
                let yy = startDate.getFullYear().toString().slice(-2);
                let mm = startDate.getMonth() + 1;
                labels.push(`${yy}年${mm}月`);
                
                let monthlyTotalValue = cashPoolBalance;
                
                // 每月资金注入
                portfolio.forEach(p => {
                    totalPrincipal += p.amount;
                    if (p.isCash) cashPoolBalance += p.amount;
                });

                // 价格更新与交易
                portfolio.forEach(p => {
                    const stats = etfStats[p.ticker] || { returns: bearMarketSequence };
                    
                    let monthlyReturn = 0;
                    if (stats.returns && stats.returns.length > 0) {
                        // 沿着真实历史顺序往后读，读到尽头就重头循环
                        let r_index = (globalStartIndex + m) % stats.returns.length;
                        monthlyReturn = stats.returns[r_index];
                    }

                    p.currentPrice = p.currentPrice * Math.exp(monthlyReturn);

                    if (p.currentPrice > p.highWaterMark) {
                        p.highWaterMark = p.currentPrice;
                        p.dip10Bought = false;
                        p.dip20Bought = false;
                    }

                    if (!p.isCash) {
                        p.shares += p.amount / p.currentPrice;
                        const drop = (p.highWaterMark - p.currentPrice) / p.highWaterMark;
                        if (drop >= 0.20 && !p.dip20Bought && cashPoolBalance > 0) {
                            let buyAmt = cashPoolBalance * 0.5; 
                            p.shares += buyAmt / p.currentPrice;
                            cashPoolBalance -= buyAmt;
                            p.dip20Bought = true;
                        } else if (drop >= 0.10 && !p.dip10Bought && cashPoolBalance > 0) {
                            let buyAmt = cashPoolBalance * 0.3; 
                            p.shares += buyAmt / p.currentPrice;
                            cashPoolBalance -= buyAmt;
                            p.dip10Bought = true;
                        }
                        monthlyTotalValue += p.shares * p.currentPrice;
                    }
                });
                historyPrincipal.push(totalPrincipal);
                historyValue.push(monthlyTotalValue);
            }

            const finalValue = historyValue[historyValue.length - 1];
            const preTaxProfit = finalValue - totalPrincipal;
            const tax = preTaxProfit > 0 ? preTaxProfit * 0.20 : 0;
            const postTaxValue = finalValue - tax;
            
            // 用“最终资产/本金倍数”替代年化，在定投中倍数更直观
            const ratio = postTaxValue / totalPrincipal;

            document.getElementById('resPrincipal').innerText = `¥ ${totalPrincipal.toLocaleString(undefined, {maximumFractionDigits: 0})}`;
            document.getElementById('resAssets').innerText = `¥ ${postTaxValue.toLocaleString(undefined, {maximumFractionDigits: 0})}`;
            document.getElementById('resProfitInfo').innerText = `¥ ${preTaxProfit.toLocaleString(undefined, {maximumFractionDigits: 0})} / ¥ ${tax.toLocaleString(undefined, {maximumFractionDigits: 0})}`;
            document.getElementById('resCagr').innerText = `${ratio.toFixed(2)} 倍`;

            renderChart(labels, historyPrincipal, historyValue);
        }

        function renderChart(labels, principalData, valueData) {
            const ctx = document.getElementById('growthChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '实际资产价值',
                            data: valueData,
                            borderColor: 'rgb(59, 130, 246)',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            fill: true,
                            tension: 0.1,
                            pointRadius: 0
                        },
                        {
                            label: '累计本金',
                            data: principalData,
                            borderColor: 'rgb(156, 163, 175)',
                            borderDash: [5, 5],
                            fill: false,
                            tension: 0.1,
                            pointRadius: 0
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { callback: function(value) { return '¥' + (value/10000).toFixed(0) + '万'; } }
                        },
                        x: {
                            ticks: {
                                maxRotation: 45,
                                minRotation: 45,
                                autoSkip: true,
                                maxTicksLimit: 24 
                            }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
